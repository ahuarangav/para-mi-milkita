<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Nuestra Historia ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#0f0f0f;
    color:white;
    overflow-x:hidden;
}

/* 🔐 LOCK SCREEN */
#lockScreen{
    position:fixed;
    width:100%;
    height:100%;
    background:#0f0f0f;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#lockScreen input{
    padding:10px;
    margin-top:10px;
    border-radius:10px;
    border:none;
}

/* BOTONES */
.btn{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    background:white;
    color:black;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),url('foto1.jpg');
    background-size:cover;
}

.hero h1{
    font-family:'Great Vibes',cursive;
    font-size:4rem;
    text-shadow:0 0 20px #ff4d6d;
}

/* NETFLIX CHAPTERS */
.chapter{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
    opacity:0;
    transform:translateY(50px);
    transition:1s;
}

.chapter.active{
    opacity:1;
    transform:translateY(0);
}

/* CARTA */
.card{
    width:280px;
    height:180px;
    perspective:1000px;
    margin:auto;
    cursor:pointer;
}

.card-inner{
    width:100%;
    height:100%;
    position:relative;
    transition:transform 0.8s;
    transform-style:preserve-3d;
}

.card.open .card-inner{
    transform:rotateY(180deg);
}

.card-front, .card-back{
    position:absolute;
    width:100%;
    height:100%;
    backface-visibility:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:15px;
    padding:15px;
}

.card-front{
    background:#222;
}

.card-back{
    background:#ff4d6d;
    transform:rotateY(180deg);
}

/* CORAZONES */
.hearts{
    position:fixed;
    width:100%;
    height:100%;
    pointer-events:none;
}

.heart{
    position:absolute;
    color:#ff4d6d;
    animation:float 8s linear infinite;
}

@keyframes float{
    from{transform:translateY(100vh);}
    to{transform:translateY(-100px);}
}

/* RESPONSIVE */
@media(max-width:768px){
.hero h1{font-size:2.5rem;}
}

</style>
</head>

<body>

<!-- 🔐 LOCK -->
<div id="lockScreen">
    <h2>🔒 Clave de amor</h2>
    <input type="password" id="password">
    <button class="btn" onclick="checkPassword()">Entrar ❤️</button>
</div>

<!-- 💖 CORAZONES -->
<div class="hearts"></div>

<!-- 🎵 MÚSICA -->
<audio id="music" loop>
    <source src="voy-a-conquistar-tu-amor.mp3">
</audio>

<!-- HERO -->
<section class="hero">
    <h1>Nuestra Historia ❤️</h1>

    <button class="btn" onclick="document.getElementById('music').play()">
        ▶ Activar música
    </button>

    <button class="btn" onclick="document.documentElement.requestFullscreen()">
        🌙 Modo romántico
    </button>
</section>

<!-- NETFLIX STORY -->
<section class="chapter">
    <h1>Capítulo 1 💕</h1>
    <p>El día que empezó todo...</p>
</section>

<section class="chapter">
    <h1>Capítulo 2 💖</h1>
    <p>Nuestros momentos juntos...</p>
</section>

<section class="chapter">
    <h1>Capítulo 3 ❤️</h1>
    <p>Y lo que aún nos falta vivir...</p>
</section>

<!-- 💌 CARTA -->
<section class="chapter">
    <h1>💌 Carta</h1>

    <div class="card" onclick="this.classList.toggle('open')">
        <div class="card-inner">
            <div class="card-front">Toca para abrir 💌</div>
            <div class="card-back">
                <p>Gracias por cada momento juntos ❤️</p>
            </div>
        </div>
    </div>
</section>

<!-- JS -->
<script>

// 🔐 PASSWORD
function checkPassword(){
    const pass = document.getElementById("password").value;

    if(pass === "milakita25"){
        document.getElementById("lockScreen").style.display="none";
    }else{
        alert("Clave incorrecta ❤️");
    }
}

// 🎬 SCROLL CHAPTERS
const chapters = document.querySelectorAll('.chapter');

window.addEventListener('scroll',()=>{
    chapters.forEach(c=>{
        if(c.getBoundingClientRect().top < window.innerHeight-100){
            c.classList.add('active');
        }
    });
});

// 💖 CORAZONES
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(Math.random()*20+15)+"px";
    document.querySelector(".hearts").appendChild(heart);
    setTimeout(()=>heart.remove(),8000);
}

setInterval(createHeart,400);

</script>

</body>
</html>
